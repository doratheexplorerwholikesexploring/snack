<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老鼠遊戲 | Mouse Game</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --grid-color: #16213e;
            --snake-head: #0f3460;
            --snake-body: #4ecca3;
            --food-color: #e94560;
            --text-color: #eeeeee;
            --accent-color: #e94560; /* Mouse theme uses food color */
            --mouse-color: #e94560;
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            text-shadow: 0 0 15px var(--accent-color);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 40px;
        }

        .mouse-icon {
            font-size: 8rem;
            margin: 40px 0;
            color: var(--mouse-color);
            text-shadow: 0 0 30px var(--mouse-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .content-box {
            background: var(--grid-color);
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            border: 2px solid var(--mouse-color);
            text-align: left;
        }

        .content-box h2 {
            color: var(--mouse-color);
            margin-top: 0;
            text-shadow: 0 0 10px var(--mouse-color);
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .nav-btn.home {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .nav-btn.snake {
            border-color: #4ecca3;
            color: #4ecca3;
        }

        .nav-btn:hover.home {
            background-color: rgba(233, 69, 96, 0.1);
        }

        .nav-btn:hover.snake {
            background-color: rgba(78, 204, 163, 0.1);
        }

        .feature-list {
            list-style-type: none;
            padding: 0;
        }

        .feature-list li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }

        .feature-list li:before {
            content: "🐭";
            margin-right: 15px;
            font-size: 1.5rem;
        }

        footer {
            margin-top: 40px;
            color: #666;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .mouse-icon {
                font-size: 6rem;
            }
            
            .content-box {
                padding: 20px;
            }
            
            .nav-buttons {
                flex-direction: column;
                width: 100%;
            }
            
            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>老鼠遊戲</h1>
            <div class="subtitle">老鼠主題遊戲頁面</div>
        </header>

        <div class="mouse-icon">🐭</div>

        <div class="content-box">
            <h2>關於老鼠遊戲</h2>
            <p>這是一個老鼠主題的遊戲頁面，目前正在開發中。未來可能會加入以下功能：</p>
            
            <ul class="feature-list">
                <li>老鼠迷宮遊戲 - 幫助老鼠找到奶酪</li>
                <li>貓捉老鼠 - 經典的追逐遊戲</li>
                <li>老鼠收集遊戲 - 收集各種奶酪獲得高分</li>
                <li>老鼠養成系統 - 照顧你的虛擬寵物鼠</li>
            </ul>
            
            <p>目前這個頁面作為一個佔位符，展示未來可能的遊戲方向。您可以返回主菜單選擇其他可玩的遊戲。</p>
        </div>

        <div class="nav-buttons">
            <a href="index.html" class="nav-btn home">🏠 返回主菜單</a>
            <a href="snake_html" class="nav-btn snake">🐍 玩貪吃蛇遊戲</a>
        </div>

        <footer>
            <p>© 2025 遊戲中心 | 老鼠遊戲頁面 - 開發中</p>
        </footer>
    </div>
</body>
</html>
