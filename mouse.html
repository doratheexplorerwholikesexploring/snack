<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老鼠捉起司 | Mouse Catch Cheese</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --grid-color: #16213e;
            --mouse-color: #e94560;
            --cheese-color: #ffd166;
            --wall-color: #4a4a6d;
            --text-color: #eeeeee;
            --accent-color: #e94560;
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .score-board {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-top: 5px;
        }

        .score-item span {
            font-weight: bold;
            color: var(--accent-color);
        }

        .home-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 1.8rem;
            text-decoration: none;
            color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .home-btn:hover {
            background: rgba(233, 69, 96, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--accent-color);
        }

        @media (max-width: 767px) {
            .home-btn {
                top: 5px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--grid-color);
            background-color: var(--grid-color);
        }

        canvas {
            display: block;
            background-color: var(--grid-color);
        }

        /* 遊戲覆蓋層 (開始、結束、暫停) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(2px);
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--cheese-color);
            text-shadow: 0 0 10px var(--cheese-color);
        }

        .overlay p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--accent-color);
        }

        button:active {
            transform: scale(0.95);
        }

        /* 虛擬控制鍵 (針對手機) */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            user-select: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: rgba(233, 69, 96, 0.3);
            border-color: var(--accent-color);
        }

        /* 隱藏電腦版不需要的按鍵 */
        @media (min-width: 768px) {
            .controls {
                display: none;
            }
            .desktop-hint {
                display: block;
                margin-top: 10px;
                color: #666;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 767px) {
            .desktop-hint {
                display: none;
            }
        }

        .instructions {
            max-width: 400px;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            padding: 0 10px;
        }

    </style>
</head>
<body>

    <header>
        <h1>老鼠捉起司</h1>
        <div class="score-board">
            <div class="score-item">分數: <span id="score">0</span></div>
            <div class="score-item">最高分: <span id="high-score">0</span></div>
            <div class="score-item">起司: <span id="cheese-count">0</span>/10</div>
        </div>
        <a href="index.html" class="home-btn" title="返回主菜單">🏠</a>
    </header>

    <main id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- 開始畫面 -->
        <div id="start-screen" class="overlay">
            <h2>捉起司遊戲</h2>
            <p>控制老鼠收集所有起司！</p>
            <button id="start-btn">開始遊戲</button>
        </div>

        <!-- 遊戲結束畫面 -->
        <div id="game-over-screen" class="overlay hidden">
            <h2>遊戲結束</h2>
            <p>最終分數: <span id="final-score">0</span></p>
            <button id="restart-btn">再玩一次</button>
        </div>

        <!-- 勝利畫面 -->
        <div id="win-screen" class="overlay hidden">
            <h2>恭喜！</h2>
            <p>你收集了所有起司！</p>
            <p>分數: <span id="win-score">0</span></p>
            <button id="win-restart-btn">再玩一次</button>
        </div>

        <!-- 暫停畫面 -->
        <div id="pause-screen" class="overlay hidden">
            <h2>已暫停</h2>
            <button id="resume-btn">繼續遊戲</button>
        </div>
    </main>

    <!-- 虛擬按鍵區 -->
    <div class="controls">
        <div class="control-btn" style="grid-area: up;" data-dir="up">▲</div>
        <div class="control-btn" style="grid-area: left;" data-dir="left">◀</div>
        <div class="control-btn" style="grid-area: down;" data-dir="down">▼</div>
        <div class="control-btn" style="grid-area: right;" data-dir="right">▶</div>
    </div>

    <div class="desktop-hint">使用方向鍵或 WASD 移動，空白鍵暫停</div>
    <div class="instructions">收集所有起司（黃色）來贏得遊戲！避免撞牆。每塊起司加10分。</div>

    <script>
        // --- 遊戲配置 ---
        const CANVAS_SIZE = 400;
        const GRID_SIZE = 20;
        const TILE_COUNT = CANVAS_SIZE / GRID_SIZE;
        const GAME_SPEED = 120;
        const TOTAL_CHEESE = 10;

        // --- DOM 元素 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const cheeseCountEl = document.getElementById('cheese-count');
        const finalScoreEl = document.getElementById('final-score');
        const winScoreEl = document.getElementById('win-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const winScreen = document.getElementById('win-screen');
        const pauseScreen = document.getElementById('pause-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const winRestartBtn = document.getElementById('win-restart-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const controlBtns = document.querySelectorAll('.control-btn');

        // --- 遊戲狀態變數 ---
        let mouse = { x: 1, y: 1 };
        let cheeses = [];
        let walls = [];
        let dx = 0;
        let dy = 0;
        let score = 0;
        let cheeseCollected = 0;
        let highScore = localStorage.getItem('mouseHighScore') || 0;
        let gameInterval;
        let isGameRunning = false;
        let isPaused = false;

        // 初始化最高分顯示
        highScoreEl.textContent = highScore;
        cheeseCountEl.textContent = `0/${TOTAL_CHEESE}`;

        // --- 輔助函數 ---
        function isPositionOccupied(x, y) {
            // 檢查是否與老鼠位置重疊
            if (x === mouse.x && y === mouse.y) return true;
            
            // 檢查是否與起司位置重疊
            for (let cheese of cheeses) {
                if (cheese.x === x && cheese.y === y) return true;
            }
            
            // 檢查是否與牆壁位置重疊
            for (let wall of walls) {
                if (wall.x === x && wall.y === y) return true;
            }
            
            return false;
        }

        function isWall(x, y) {
            for (let wall of walls) {
                if (wall.x === x && wall.y === y) return true;
            }
            return false;
        }

        function createCheese() {
            let cheeseX, cheeseY;
            do {
                cheeseX = Math.floor(Math.random() * (TILE_COUNT - 2)) + 1;
                cheeseY = Math.floor(Math.random() * (TILE_COUNT - 2)) + 1;
            } while (isPositionOccupied(cheeseX, cheeseY));
            
            cheeses.push({ x: cheeseX, y: cheeseY });
        }

        // --- 遊戲邏輯 ---

        function initGame() {
            // 初始化老鼠位置
            mouse = { x: 1, y: 1 };
            dx = 0;
            dy = 0;
            
            // 初始化起司
            cheeses = [];
            for (let i = 0; i < TOTAL_CHEESE; i++) {
                createCheese();
            }
            
            // 初始化牆壁（簡單的邊界）
            walls = [];
            for (let x = 0; x < TILE_COUNT; x++) {
                walls.push({ x: x, y: 0 });
                walls.push({ x: x, y: TILE_COUNT - 1 });
            }
            for (let y = 1; y < TILE_COUNT - 1; y++) {
                walls.push({ x: 0, y: y });
                walls.push({ x: TILE_COUNT - 1, y: y });
            }
            
            // 添加一些內部障礙物
            for (let i = 0; i < 8; i++) {
                let wallX, wallY;
                do {
                    wallX = Math.floor(Math.random() * (TILE_COUNT - 4)) + 2;
                    wallY = Math.floor(Math.random() * (TILE_COUNT - 4)) + 2;
                } while (isPositionOccupied(wallX, wallY));
                walls.push({ x: wallX, y: wallY });
            }

            score = 0;
            cheeseCollected = 0;
            scoreEl.textContent = score;
            cheeseCountEl.textContent = `0/${TOTAL_CHEESE}`;
            
            isGameRunning = true;
            isPaused = false;
            
            // 隱藏所有覆蓋層
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            winScreen.classList.add('hidden');
            pauseScreen.classList.add('hidden');

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, GAME_SPEED);
            
            draw();
        }

        function gameLoop() {
            if (isPaused) return;

            update();
            draw();
        }

        function update() {
            // 計算新的老鼠位置
            const newX = mouse.x + dx;
            const newY = mouse.y + dy;

            // 檢查是否撞牆
            if (isWall(newX, newY)) {
                gameOver();
                return;
            }

            // 更新老鼠位置
            mouse.x = newX;
            mouse.y = newY;

            // 檢查是否吃到起司
            for (let i = cheeses.length - 1; i >= 0; i--) {
                if (mouse.x === cheeses[i].x && mouse.y === cheeses[i].y) {
                    // 收集起司
                    cheeses.splice(i, 1);
                    score += 10;
                    cheeseCollected++;
                    scoreEl.textContent = score;
                    cheeseCountEl.textContent = `${cheeseCollected}/${TOTAL_CHEESE}`;
                    
                    // 檢查是否贏得遊戲
                    if (cheeseCollected >= TOTAL_CHEESE) {
                        winGame();
                        return;
                    }
                    
                    // 生成新的起司
                    createCheese();
                    break;
                }
            }
        }

        function draw() {
            // 清空畫布
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫牆壁
            ctx.fillStyle = '#4a4a6d';
            walls.forEach(wall => {
                ctx.fillRect(
                    wall.x * GRID_SIZE, 
                    wall.y * GRID_SIZE, 
                    GRID_SIZE, 
                    GRID_SIZE
                );
            });

            // 畫起司
            cheeses.forEach(cheese => {
                ctx.fillStyle = '#ffd166';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffd166';
                
                // 畫圓形起司
                ctx.beginPath();
                ctx.arc(
                    cheese.x * GRID_SIZE + GRID_SIZE / 2,
                    cheese.y * GRID_SIZE + GRID_SIZE / 2,
                    GRID_SIZE / 2 - 2,
                    0, 2 * Math.PI
                );
                ctx.fill();
                
                // 起司孔
                ctx.fillStyle = '#ffb347';
                ctx.beginPath();
                ctx.arc(
                    cheese.x * GRID_SIZE + GRID_SIZE / 3,
                    cheese.y * GRID_SIZE + GRID_SIZE / 2,
                    GRID_SIZE / 8,
                    0, 2 * Math.PI
                );
                ctx.arc(
                    cheese.x * GRID_SIZE + 2 * GRID_SIZE / 3,
                    cheese.y * GRID_SIZE + GRID_SIZE / 3,
                    GRID_SIZE / 10,
                    0, 2 * Math.PI
                );
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });

            // 畫老鼠
            ctx.fillStyle = '#e94560';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#e94560';
            
            // 老鼠身體
            ctx.beginPath();
            ctx.arc(
                mouse.x * GRID_SIZE + GRID_SIZE / 2,
                mouse.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0, 2 * Math.PI
            );
            ctx.fill();
            
            // 老鼠耳朵
            ctx.fillStyle = '#ff6b8b';
            ctx.beginPath();
            ctx.arc(
                mouse.x * GRID_SIZE + GRID_SIZE / 3,
                mouse.y * GRID_SIZE + GRID_SIZE / 3,
                GRID_SIZE / 4,
                0, 2 * Math.PI
            );
            ctx.arc(
                mouse.x * GRID_SIZE + 2 * GRID_SIZE / 3,
                mouse.y * GRID_SIZE + GRID_SIZE / 3,
                GRID_SIZE / 4,
                0, 2 * Math.PI
            );
            ctx.fill();
            
            // 老鼠眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(
                mouse.x * GRID_SIZE + GRID_SIZE / 3,
                mouse.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 8,
                0, 2 * Math.PI
            );
            ctx.arc(
                mouse.x * GRID_SIZE + 2 * GRID_SIZE / 3,
                mouse.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 8,
                0, 2 * Math.PI
            );
            ctx.fill();
            
            // 老鼠鼻子
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(
                mouse.x * GRID_SIZE + GRID_SIZE / 2,
                mouse.y * GRID_SIZE + 2 * GRID_SIZE / 3,
                GRID_SIZE / 12,
                0, 2 * Math.PI
            );
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('mouseHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        function winGame() {
            isGameRunning = false;
            clearInterval(gameInterval);
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('mouseHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            winScoreEl.textContent = score;
            winScreen.classList.remove('hidden');
        }

        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseScreen.classList.remove('hidden');
            } else {
                pauseScreen.classList.add('hidden');
            }
        }

        // --- 輸入控制 ---

        function changeDirection(direction) {
            if (!isGameRunning || isPaused) return;

            switch (direction) {
                case 'up':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        }

        // 鍵盤監聽
        document.addEventListener('keydown', (e) => {
            // 防止方向鍵滾動頁面
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (!isGameRunning && startScreen.classList.contains('hidden') === false) {
                if(e.key === 'Enter' || e.key === ' ') initGame();
                return;
            }

            if (e.key === ' ' || e.key === 'Escape') {
                togglePause();
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    break;
            }
        });

        // 虛擬按鍵監聽 (觸控)
        controlBtns.forEach(btn => {
            // 使用 touchstart 以獲得更快的響應，防止點擊延遲
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // 防止預設觸控行為
                const dir = btn.getAttribute('data-dir');
                changeDirection(dir);
            }, { passive: false });

            // 同時也綁定 click 以備不時之需
            btn.addEventListener('click', () => {
                const dir = btn.getAttribute('data-dir');
                changeDirection(dir);
            });
        });

        // 按鈕事件綁定
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);
        winRestartBtn.addEventListener('click', initGame);
        resumeBtn.addEventListener('click', togglePause);

        // 初始繪製一次背景
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

    </script>
</body>
</html>
