<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec6fa5",
                        "background-light": "#f8f6f7",
                        "background-dark": "#211118",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Spline Sans', sans-serif; }
        .game-grid {
            background-image: radial-gradient(circle, #ec6fa520 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-primary/10">
<button class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">pause</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-xl font-bold tracking-tight text-primary">Greedy Snake</h1>
<div class="flex gap-4">
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase font-bold text-slate-500">Score</span>
<span class="text-lg font-bold leading-none">0120</span>
</div>
<div class="w-px h-8 bg-primary/20"></div>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase font-bold text-slate-500">Best</span>
<span class="text-lg font-bold leading-none">2450</span>
</div>
</div>
</div>
<button class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Game Area -->
<main class="flex-1 flex flex-col p-4 gap-4 max-w-md mx-auto w-full">
<!-- Game Board Container -->
<div class="relative aspect-square w-full rounded-xl bg-white dark:bg-slate-800 shadow-xl shadow-primary/5 border-4 border-primary/20 overflow-hidden game-grid">
<!-- Snake Head -->
<div class="absolute top-[40%] left-[50%] size-5 bg-primary rounded-sm shadow-sm flex items-center justify-center">
<div class="flex gap-1">
<div class="size-1 bg-white rounded-full"></div>
<div class="size-1 bg-white rounded-full"></div>
</div>
</div>
<!-- Snake Body -->
<div class="absolute top-[40%] left-[45%] size-5 bg-primary/60 rounded-sm"></div>
<div class="absolute top-[40%] left-[40%] size-5 bg-primary/40 rounded-sm"></div>
<div class="absolute top-[45%] left-[40%] size-5 bg-primary/20 rounded-sm"></div>
<!-- Food Item (Blue Palette Accent) -->
<div class="absolute top-[20%] left-[30%] size-5 bg-sky-400 rounded-full animate-pulse flex items-center justify-center shadow-lg shadow-sky-200">
<div class="size-2 bg-white rounded-full opacity-50"></div>
</div>
<!-- Level Badge -->
<div class="absolute bottom-4 right-4 bg-primary/10 backdrop-blur-md px-3 py-1 rounded-full border border-primary/20">
<span class="text-xs font-bold text-primary">Level 05</span>
</div>
</div>
<!-- Controls Section -->
<div class="flex-1 flex flex-col justify-center items-center gap-6">
<!-- D-Pad -->
<div class="relative size-48 flex items-center justify-center">
<!-- Center Decoration -->
<div class="absolute size-16 bg-primary/10 rounded-full"></div>
<!-- Up Button -->
<button class="absolute top-0 size-16 bg-white dark:bg-slate-700 shadow-lg rounded-xl flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl">keyboard_arrow_up</span>
</button>
<!-- Down Button -->
<button class="absolute bottom-0 size-16 bg-white dark:bg-slate-700 shadow-lg rounded-xl flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl">keyboard_arrow_down</span>
</button>
<!-- Left Button -->
<button class="absolute left-0 size-16 bg-white dark:bg-slate-700 shadow-lg rounded-xl flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl">keyboard_arrow_left</span>
</button>
<!-- Right Button -->
<button class="absolute right-0 size-16 bg-white dark:bg-slate-700 shadow-lg rounded-xl flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl">keyboard_arrow_right</span>
</button>
</div>
<!-- Bottom Actions -->
<div class="flex gap-4 w-full px-4">
<button class="flex-1 h-12 bg-sky-100 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400 font-bold rounded-xl flex items-center justify-center gap-2">
<span class="material-symbols-outlined">bolt</span>
                    Boost
                </button>
<button class="flex-1 h-12 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">restart_alt</span>
                    Reset
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="border-t border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-3 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">videogame_asset</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Play</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Ranks</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Profile</span>
</a>
</nav>
</body></html>
